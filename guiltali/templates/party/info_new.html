{% extends "base.html" %}
{% block title %}New note{% endblock %}
{% block content %}
<a href="{% url 'info' %}" class="muted" style="font-size:12.5px" data-snd="rustle">← Information</a>
<div class="card" style="margin-top:8px">
  <h2>New {% if kind == 'note' %}note{% else %}page{% endif %}</h2>
  <form method="post">
    {% csrf_token %}
    {% if is_staff %}
    <label>Type</label>
    <select name="kind">
      {% for value, label in kind_choices %}<option value="{{ value }}" {% if value == kind %}selected{% endif %}>{{ label }}</option>{% endfor %}
    </select>
    {% else %}
    <input type="hidden" name="kind" value="note">
    {% endif %}
    <label>Title</label>
    <input type="text" name="title" placeholder="e.g. Trailhead parking" required>
    <label>Subtitle (optional)</label>
    <input type="text" name="subtitle" placeholder="One line shown in the list">
    <label>Body</label>
    <textarea name="body" rows="8" placeholder="Plain text. Blank lines split paragraphs. Lines starting with '- ' become a bulleted list."></textarea>
    <label style="display:flex;align-items:center;gap:6px;text-transform:none;font-size:13px;font-weight:600;margin-top:12px">
      <input type="checkbox" name="announce" checked style="width:auto"> Post an announcement to the feed
    </label>
    <button class="btn" type="submit" style="margin-top:14px;width:100%" data-snd="hoot">Add it</button>
  </form>
</div>
{% endblock %}
