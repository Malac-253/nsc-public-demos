{% extends "base.html" %}
{% block title %}Edit trip{% endblock %}
{% block content %}
<a href="{% url 'experience' %}" class="muted" style="font-size:12.5px" data-snd="rustle">← Trip experience</a>
<div class="card" style="margin-top:8px">
  <h2>Edit trip details</h2>
  <p class="muted" style="font-size:12px;margin-bottom:8px">Admins &amp; moderators only — changes show up everywhere immediately.</p>
  <form method="post">
    {% csrf_token %}
    <label>Trip name</label>
    <input type="text" name="name" value="{{ trip.name }}">
    <label>Tagline</label>
    <input type="text" name="tagline" value="{{ trip.tagline }}">
    <label>Listing title</label>
    <input type="text" name="listing_title" value="{{ trip.listing_title }}">
    <label>Listing summary</label>
    <textarea name="listing_summary" rows="3">{{ trip.listing_summary }}</textarea>
    <label>Address</label>
    <input type="text" name="address" value="{{ trip.address }}">
    <label>Host name</label>
    <input type="text" name="host_name" value="{{ trip.host_name }}">
    <div class="formrow">
      <div><label>Guests</label><input type="number" name="guests" value="{{ trip.guests|default:'' }}"></div>
      <div><label>Bedrooms</label><input type="number" name="bedrooms" value="{{ trip.bedrooms|default:'' }}"></div>
    </div>
    <div class="formrow">
      <div><label>Beds</label><input type="number" name="beds" value="{{ trip.beds|default:'' }}"></div>
      <div><label>Baths</label><input type="number" name="baths" value="{{ trip.baths|default:'' }}"></div>
    </div>
    <label>Check-in note</label>
    <input type="text" name="check_in_note" value="{{ trip.check_in_note }}">
    <label>Check-out note</label>
    <input type="text" name="checkout_note" value="{{ trip.checkout_note }}">
    <label>WiFi info</label>
    <input type="text" name="wifi_info" value="{{ trip.wifi_info }}">
    <label>Lock code</label>
    <input type="text" name="lock_code" value="{{ trip.lock_code }}">
    <label>House notes <span class="sub" style="text-transform:none;font-weight:500">(lines starting with "- " become a list)</span></label>
    <textarea name="house_notes" rows="5">{{ trip.house_notes }}</textarea>
    <label>Area guide — Berkeley Springs, national parks, things to do nearby</label>
    <textarea name="area_guide" rows="6" placeholder="- Berkeley Springs State Park bathhouse&#10;- Cacapon Resort State Park hiking&#10;- Lot 12 Public House for dinner">{{ trip.area_guide }}</textarea>
    <button class="btn" type="submit" style="margin-top:14px;width:100%" data-snd="hoot">Save trip details</button>
  </form>
</div>
{% endblock %}
