databases:
  - name: guiltali-db
    plan: free
    databaseName: guiltali

services:
  - type: web
    name: guiltali-brock-trip
    runtime: python
    plan: free
    rootDir: guiltali
    buildCommand: "./build.sh"
    startCommand: "gunicorn guiltali.wsgi:application"
    # Persistent uploads require a paid plan (Starter+). Uncomment after upgrading:
    # disk:
    #   name: guiltali-media
    #   mountPath: /var/data
    #   sizeGB: 1
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "0"
      - key: WEB_CONCURRENCY
        value: "2"
      - key: PYTHON_VERSION
        value: "3.12.6"
      - key: DATABASE_URL
        fromDatabase:
          name: guiltali-db
          property: connectionString
      # Uncomment together with disk above (Starter+ plan):
      # - key: MEDIA_ROOT
      #   value: /var/data/media