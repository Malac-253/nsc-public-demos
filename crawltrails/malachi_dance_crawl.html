<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Malachi's Birthday Dance Crawl</title>
  <style>
    :root {
      --bg: #050507;
      --panel: rgba(28, 31, 38, 0.92);
      --panel-border: rgba(255, 255, 255, 0.075);
      --text: #f6f6f7;
      --muted: #a9a9b2;
      --purple: #a05cff;
      --blue: #2f8cff;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
      --time-col-width: 72px;
      --rail-width: 4px;
      --node-size: 16px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      14% { transform: scale(1.18); }
      28% { transform: scale(1); }
      42% { transform: scale(1.12); }
      70% { transform: scale(1); }
    }

    @keyframes pulse-glow {
      0%, 100% {
        box-shadow: 0 0 12px color-mix(in srgb, var(--line-color) 45%, transparent);
        transform: scale(1);
      }
      50% {
        box-shadow: 0 0 22px color-mix(in srgb, var(--line-color) 75%, transparent);
        transform: scale(1.08);
      }
    }

    @keyframes rail-flow {
      0% { top: 0%; opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { top: 100%; opacity: 0; }
    }

    @keyframes shake {
      0%, 100% { transform: rotate(0deg); }
      20% { transform: rotate(-12deg); }
      40% { transform: rotate(10deg); }
      60% { transform: rotate(-8deg); }
      80% { transform: rotate(6deg); }
    }

    @keyframes wiggle {
      0%, 100% { transform: rotate(0deg) translateY(0); }
      25% { transform: rotate(-2deg) translateY(-2px); }
      75% { transform: rotate(2deg) translateY(-1px); }
    }

    @keyframes slide-in-up {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes chev-nudge {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(5px); }
    }

    @keyframes dot-ping {
      0% { transform: scale(1); opacity: 1; }
      70% { transform: scale(2.2); opacity: 0; }
      100% { transform: scale(2.2); opacity: 0; }
    }

    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

    @keyframes badge-pulse {
      0%, 100% {
        box-shadow: inset 0 0 0 1px rgba(0,0,0,.3), 0 0 10px color-mix(in srgb, var(--line-color) 25%, transparent);
      }
      50% {
        box-shadow: inset 0 0 0 1px rgba(0,0,0,.3), 0 0 18px color-mix(in srgb, var(--line-color) 55%, transparent);
      }
    }

    @keyframes bg-drift {
      0%, 100% { background-position: 0% 0%, 100% 25%; }
      50% { background-position: 2% 1%, 98% 27%; }
    }

    @keyframes transfer-sway {
      0%, 100% { transform: translateX(4px); }
      50% { transform: translateX(8px); }
    }

    @keyframes time-tick {
      0%, 100% { opacity: 0.75; }
      50% { opacity: 1; color: #e8e8ee; }
    }

    @keyframes tap-pop {
      0% { transform: scale(1); }
      35% { transform: scale(0.985); }
      100% { transform: scale(1); }
    }

    @keyframes node-breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.06); }
    }

    body {
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 50% 0%, rgba(110, 63, 255, 0.17), transparent 34%),
        radial-gradient(circle at 100% 25%, rgba(40, 140, 255, 0.10), transparent 32%),
        var(--bg);
      background-size: 100% 100%, 100% 100%;
      animation: bg-drift 12s ease-in-out infinite;
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 0;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    .crawl-shell {
      width: min(100vw, 480px);
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.025), transparent 20%),
        rgba(0,0,0,0.45);
      position: relative;
      overflow-x: clip;
      box-shadow: var(--shadow);
    }

    .crawl-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle at 22% 12%, rgba(255,255,255,0.05) 0 1px, transparent 1px),
        radial-gradient(circle at 72% 78%, rgba(255,255,255,0.035) 0 1px, transparent 1px);
      background-size: 40px 40px, 52px 52px;
      opacity: 0.35;
    }

    .crawl-app {
      position: relative;
      z-index: 1;
      padding:
        max(20px, env(safe-area-inset-top))
        max(14px, env(safe-area-inset-right))
        max(28px, env(safe-area-inset-bottom))
        max(14px, env(safe-area-inset-left));
    }

    .footer-note {
      display: flex;
      align-items: center;
      margin: 0 0 16px;
      min-height: 48px;
      border-radius: 16px;
      background: rgba(27,29,36,.96);
      border: 1px solid rgba(255,255,255,.08);
      padding: 8px 14px;
      gap: 12px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
      animation: slide-in-up 0.55s cubic-bezier(0.22, 1, 0.36, 1) both;
      transition: border-color 0.25s ease, box-shadow 0.25s ease, transform 0.25s ease;
    }

    .footer-note .globe {
      color: var(--purple);
      font-size: 26px;
      animation: float 3.2s ease-in-out infinite;
      transition: transform 0.2s ease, filter 0.2s ease;
    }

    .footer-note p { margin: 0; flex: 1; color: #d7d7dc; font-size: 14px; font-weight: 650; line-height: 1.35; }
    .footer-note .heart {
      color: var(--purple);
      font-size: 28px;
      line-height: 1;
      animation: heartbeat 2.4s ease-in-out infinite;
      transition: transform 0.2s ease;
    }

    .updated {
      margin: 0 0 8px 4px;
      color: var(--muted);
      font-style: italic;
      font-size: 14px;
      font-weight: 600;
      animation: fade-in 0.6s ease both 0.1s, time-tick 4s ease-in-out infinite;
    }

    .sticky-header {
      position: sticky;
      top: 0;
      z-index: 20;
      margin: 0 -14px 10px;
      padding:
        10px
        max(14px, env(safe-area-inset-right))
        12px
        max(14px, env(safe-area-inset-left));
      padding-top: max(10px, env(safe-area-inset-top));
      background: rgba(5, 5, 7, 0.94);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
    }

    .section-title {
      margin: 0 0 0 4px;
      font-size: 28px;
      line-height: 1.1;
      letter-spacing: -0.04em;
      animation: slide-in-up 0.5s cubic-bezier(0.22, 1, 0.36, 1) both 0.15s;
      transition: letter-spacing 0.3s ease, text-shadow 0.3s ease;
    }

    .route-list {
      --line-color: var(--purple);
      position: relative;
      padding-bottom: 8px;
    }

    /* ── Stop segment ── */
    .stop {
      display: grid;
      grid-template-columns: var(--time-col-width) 1fr;
      gap: 0 10px;
      position: relative;
      margin-bottom: 2px;
      animation: slide-in-up 0.55s cubic-bezier(0.22, 1, 0.36, 1) both;
      animation-delay: calc(0.12s * var(--stagger, 0) + 0.2s);
    }

    .stop-content {
      min-width: 0;
      padding-bottom: 6px;
    }

    .is-touch .stop-content,
    .is-touch .transfer-card {
      cursor: pointer;
      -webkit-user-select: none;
      user-select: none;
    }

    .stop-content:focus-visible,
    .transfer-card:focus-visible,
    .footer-note:focus-visible {
      outline: 2px solid rgba(47, 140, 255, 0.55);
      outline-offset: 3px;
      border-radius: 12px;
    }

    .stop.is-last .rail {
      bottom: calc(var(--node-size) / 2 + 4px);
    }

    /* ── Time + rail column ── */
    .time-rail {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 2px;
    }

    .time-start,
    .time-end {
      width: 100%;
      text-align: right;
      padding-right: 10px;
      color: #b9b9c0;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.1;
      flex-shrink: 0;
      transition: color 0.25s ease, transform 0.25s ease;
    }

    .time-start { margin-bottom: 6px; }
    .time-end { margin-top: 6px; }

    .rail-track {
      position: relative;
      flex: 1;
      width: 100%;
      min-height: 56px;
      display: flex;
      justify-content: center;
      padding: 4px 0 8px;
    }

    .rail {
      position: absolute;
      top: calc(var(--node-size) / 2 + 4px);
      bottom: calc(var(--node-size) / 2 + 4px);
      width: var(--rail-width);
      border-radius: 999px;
      background: var(--line-color);
      box-shadow: 0 0 14px color-mix(in srgb, var(--line-color) 50%, transparent);
      transition: width 0.3s ease, box-shadow 0.3s ease;
      overflow: hidden;
    }

    .rail::after {
      content: "";
      position: absolute;
      left: -1px;
      width: calc(100% + 2px);
      height: 18px;
      border-radius: 999px;
      background: linear-gradient(180deg, transparent, rgba(255,255,255,0.85), transparent);
      animation: rail-flow 2.8s ease-in-out infinite;
      animation-delay: calc(var(--stagger, 0) * 0.35s);
      opacity: 0.7;
    }

    .node {
      position: absolute;
      top: 4px;
      width: var(--node-size);
      height: var(--node-size);
      border-radius: 50%;
      background: #101014;
      border: 3.5px solid var(--line-color);
      box-shadow: 0 0 12px color-mix(in srgb, var(--line-color) 45%, transparent);
      z-index: 2;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .node::after {
      content: "";
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 2px solid var(--line-color);
      opacity: 0;
      animation: dot-ping 2.4s ease-out infinite;
      animation-delay: calc(var(--stagger, 0) * 0.4s + 0.5s);
    }

    .node-end {
      top: auto;
      bottom: 4px;
    }

    .line-card {
      margin-bottom: 10px;
      border-radius: 14px;
      background:
        linear-gradient(105deg, rgba(38,41,49,.97), rgba(22,24,30,.97)),
        linear-gradient(90deg, transparent 30%, rgba(255,255,255,0.04) 50%, transparent 70%);
      background-size: 100% 100%, 200% 100%;
      border: 1px solid var(--panel-border);
      padding: 10px 12px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.07), 0 10px 30px rgba(0,0,0,.23);
      transition: transform 0.28s cubic-bezier(0.22, 1, 0.36, 1), border-color 0.28s ease, box-shadow 0.28s ease;
      cursor: default;
    }

    .line-title {
      color: var(--line-color);
      font-weight: 900;
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      letter-spacing: -0.03em;
      margin: 0 0 8px;
    }

    .line-dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: var(--line-color);
      box-shadow: 0 0 10px color-mix(in srgb, var(--line-color) 50%, transparent);
      flex-shrink: 0;
      position: relative;
      transition: transform 0.2s ease;
    }

    .links-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .links-row .link-pill:nth-child(2) { transition-delay: 0ms; }
    .links-row .link-pill:nth-child(3) { transition-delay: 40ms; }
    .links-row .link-pill:nth-child(4) { transition-delay: 80ms; }

    .links-label {
      color: #c2c3ca;
      font-weight: 800;
      font-size: 13px;
      margin-right: 2px;
    }

    .link-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: clamp(44px, 14vw, 56px);
      height: 22px;
      padding: 0 8px;
      border-radius: 3px;
      background: #8f9097;
      color: #101014;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.02em;
      text-decoration: none;
      text-transform: uppercase;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.16);
      transition: transform 0.2s cubic-bezier(0.22, 1, 0.36, 1), filter 0.2s ease, box-shadow 0.2s ease;
    }

    .link-pill:last-child {
      border-radius: 3px 8px 8px 3px;
    }

    .link-pill.is-live {
      background: var(--line-color);
      color: #0a0a0c;
      box-shadow: 0 0 10px color-mix(in srgb, var(--line-color) 35%, transparent);
    }

    .venue-block {
      padding-top: 2px;
      transition: transform 0.25s ease;
    }

    .venue-name {
      font-size: 22px;
      line-height: 1.1;
      font-weight: 900;
      letter-spacing: -0.04em;
      margin: 0;
    }

    .venue-name a {
      color: inherit;
      text-decoration: none;
      transition: color 0.2s ease, text-shadow 0.2s ease;
    }

    .chevs {
      display: inline-flex;
      align-items: center;
      gap: 0;
      margin-left: 4px;
      vertical-align: baseline;
    }

    .chev {
      display: inline-block;
      color: var(--blue);
      font-weight: 900;
      line-height: 1;
      transition: transform 0.2s ease;
    }

    .chevs .chev:nth-child(1) { animation-delay: 0s; }
    .chevs .chev:nth-child(2) { animation-delay: 0.1s; }
    .chevs .chev:nth-child(3) { animation-delay: 0.2s; }

    .time-badge {
      display: inline-block;
      margin-top: 5px;
      padding: 2px 7px 3px;
      border-radius: 6px;
      border: 2px solid var(--line-color);
      color: #fafafa;
      font-size: 14px;
      line-height: 1;
      font-weight: 900;
      background: rgba(0,0,0,.35);
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.3), 0 0 10px color-mix(in srgb, var(--line-color) 25%, transparent);
      transition: transform 0.2s ease, border-color 0.2s ease;
      cursor: default;
    }

    .subtitle,
    .description {
      margin: 4px 0 0;
      color: #d4d4db;
      font-size: 15px;
      line-height: 1.25;
      font-weight: 600;
      transition: color 0.25s ease, transform 0.25s ease;
    }

    .description { color: var(--muted); margin-top: 2px; }

    /* ── Transfer ── */
    .transfer {
      display: grid;
      grid-template-columns: var(--time-col-width) 1fr;
      gap: 0 10px;
      align-items: center;
      margin: 6px 0 10px;
      min-height: 48px;
      position: relative;
      animation: slide-in-up 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;
      animation-delay: calc(0.12s * var(--stagger, 0) + 0.35s);
    }

    .transfer::before {
      content: "";
      position: absolute;
      height: 1px;
      background: rgba(255,255,255,.18);
      top: 50%;
      left: 8px;
      width: calc(var(--time-col-width) - 16px);
    }

    .transfer-card {
      border-radius: 12px;
      background: linear-gradient(95deg, rgba(33,36,45,.96), rgba(23,25,31,.96));
      border: 1px solid rgba(255,255,255,.055);
      min-height: 48px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0,0,0,.24);
      transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
    }

    .transfer-head {
      display: grid;
      grid-template-columns: 42px 1fr auto;
      align-items: center;
      min-height: 48px;
    }

    .transfer-summary:focus-visible .transfer-card {
      outline: 2px solid rgba(47, 140, 255, 0.55);
      outline-offset: 3px;
    }

    .transfer-details[open] .transfer-card {
      border-color: rgba(160, 92, 255, 0.28);
      box-shadow: 0 10px 28px rgba(0,0,0,.3), 0 0 16px rgba(160, 92, 255, 0.1);
    }

    .transfer-icon {
      height: 100%;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,.04);
      color: var(--purple);
      font-size: 22px;
      font-weight: 900;
      transition: transform 0.2s ease;
    }

    .transfer-copy { padding: 7px 12px; }

    .transfer-title {
      margin: 0;
      font-size: 15px;
      line-height: 1;
      font-weight: 900;
    }

    .transfer-text {
      margin: 3px 0 0;
      color: #aeb0b8;
      font-size: 13px;
      line-height: 1.2;
      font-weight: 600;
    }

    .transfer-details {
      grid-column: 2;
      margin: 0;
    }

    .transfer-details > summary {
      list-style: none;
      cursor: pointer;
    }

    .transfer-details > summary::-webkit-details-marker {
      display: none;
    }

    .transfer-chev {
      margin-right: 10px;
      color: var(--muted);
      font-size: 26px;
      font-weight: 900;
      line-height: 1;
      min-width: 32px;
      text-align: center;
      transition: transform 0.25s ease, color 0.25s ease;
      flex-shrink: 0;
    }

    .transfer-details[open] .transfer-chev {
      transform: rotate(90deg);
      color: var(--purple);
    }

    .transfer-head .transfer-copy {
      min-width: 0;
    }

    .transfer-options {
      display: grid;
      gap: 8px;
      margin-top: 8px;
      padding-left: 2px;
    }

    .transfer-option {
      border-radius: 11px;
      background: rgba(18, 20, 26, 0.92);
      border: 1px solid rgba(255,255,255,.06);
      padding: 10px 12px;
      display: grid;
      grid-template-columns: 36px 1fr auto;
      gap: 10px;
      align-items: center;
      transition: border-color 0.2s ease, transform 0.2s ease;
    }

    .transfer-option:active {
      transform: scale(0.98);
      border-color: rgba(160, 92, 255, 0.3);
    }

    .transfer-mode-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: rgba(255,255,255,.05);
      display: grid;
      place-items: center;
      font-size: 18px;
    }

    .transfer-option-label {
      margin: 0;
      font-size: 14px;
      font-weight: 900;
      line-height: 1.1;
    }

    .transfer-option-detail {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.25;
      font-weight: 600;
    }

    .transfer-option-time {
      color: #9ec0ff;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .weather-card {
      margin-top: 10px;
      border-radius: 13px;
      background: linear-gradient(135deg, rgba(47, 140, 255, 0.14), rgba(24, 185, 92, 0.08));
      border: 1px solid rgba(47, 140, 255, 0.22);
      padding: 10px 12px;
    }

    .weather-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 6px;
    }

    .weather-day-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .weather-unit-toggle {
      display: inline-flex;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.1);
      overflow: hidden;
    }

    .weather-unit {
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      padding: 4px 8px;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease;
    }

    .weather-unit.is-active {
      background: rgba(47, 140, 255, 0.28);
      color: #d8ebff;
    }

    .weather-unit:active {
      transform: scale(0.96);
    }

    .weather-day {
      margin: 0;
      font-size: 13px;
      font-weight: 800;
      color: #9ec0ff;
      letter-spacing: 0.02em;
    }

    .weather-temps {
      margin: 2px 0 0;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1;
    }

    .weather-temps .weather-high {
      color: inherit;
      font-size: inherit;
      font-weight: inherit;
    }

    .weather-temps .weather-low {
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .weather-temps .weather-low::before {
      content: " ";
    }

    .weather-icon {
      font-size: 26px;
      line-height: 1;
    }

    .weather-summary {
      margin: 0 0 8px;
      color: #d4d4db;
      font-size: 13px;
      line-height: 1.35;
      font-weight: 600;
    }

    .weather-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 10px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
    }

    .demo-credit {
      margin-top: 28px;
      padding-top: 18px;
      border-top: 1px solid rgba(255,255,255,.08);
      text-align: center;
    }

    .demo-credit p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      font-weight: 600;
    }

    .demo-credit strong {

    /* ── Interactive states: scroll (touch), tap, hover (desktop) ── */

    .stop:is(.is-in-view, .is-tapped) .line-dot {

    .footer-note.is-tapped .globe {
      animation: shake 0.5s ease-in-out;
      filter: drop-shadow(0 0 8px rgba(160, 92, 255, 0.6));

    .footer-note.is-tapped .heart {

    .transfer.is-tapped .transfer-card {

    .link-pill:active {

    .venue-name a:active {

    @media (hover: hover) and (pointer: fine) {

    const app = document.getElementById("app");

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderWeather(weather) {
      if (!weather) return "";
      return `
        <div
          class="weather-card"
          aria-label="Weather forecast"
          data-high-f="${weather.highF}"
          data-low-f="${weather.lowF}"
          data-summary-f="${escapeHtml(weather.summaryF)}"
          data-summary-c="${escapeHtml(weather.summaryC)}"
        >
          <div class="weather-top">
            <div>
              <div class="weather-day-row">
                <p class="weather-day">${escapeHtml(weather.day)} · ${escapeHtml(weather.precip)} rain</p>
                <div class="weather-unit-toggle" role="group" aria-label="Temperature unit">
                  <button type="button" class="weather-unit is-active" data-unit="F">°F</button>
                  <button type="button" class="weather-unit" data-unit="C">°C</button>
                </div>
              </div>
              <p class="weather-temps">
                <span class="weather-high">${weather.highF}°</span>
                <span class="weather-low">${weather.lowF}°</span>
              </p>
            </div>
            <span class="weather-icon" aria-hidden="true">☀️</span>
          </div>
          <p class="weather-summary">${escapeHtml(weather.summaryF)}</p>
          <div class="weather-meta">
            <span>${escapeHtml(weather.wind)}</span>
            <span>Humidity ${escapeHtml(weather.humidity)}</span>
            <span>UV ${escapeHtml(weather.uv)}</span>
            <span>↑ ${escapeHtml(weather.sunrise)}</span>
            <span>↓ ${escapeHtml(weather.sunset)}</span>
          </div>
        </div>
      `;
    }

    function renderTransferOptions(options) {
      if (!options?.length) return "";
      return `
        <div class="transfer-options">
          ${options.map((option) => `
            <div class="transfer-option">
              <span class="transfer-mode-icon" aria-hidden="true">${escapeHtml(option.icon)}</span>
              <div>
                <p class="transfer-option-label">${escapeHtml(option.label)}</p>
                <p class="transfer-option-detail">${escapeHtml(option.detail)}</p>
              </div>
              <span class="transfer-option-time">${escapeHtml(option.duration)}</span>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderLinks(stop) {
      const links = stop.links || [];
      if (!links.length) return "";
      const count = links.length;
      return `
        <div class="links-row">
          <span class="links-label">${count} link${count === 1 ? "" : "s"}</span>
          ${links.map(link => `
            <a
              class="link-pill is-live"
              href="${escapeHtml(link.url)}"
              target="_blank"
              rel="noopener noreferrer"
            >${escapeHtml(link.label)}</a>
          `).join("")}
        </div>
      `;
    }

    function renderChevs() {
      return `<span class="chevs" aria-hidden="true"><span class="chev">›</span><span class="chev">›</span><span class="chev">›</span></span>`;
    }

    function renderLineCard(stop) {
      return `
        <div class="line-card">
          <p class="line-title"><span class="line-dot"></span>${escapeHtml(stop.lineName)}</p>

        </div>
      `;
    }

    function renderStop(stop, index, total) {
      const isLast = index === total - 1;
      const mapsUrl = (stop.links || []).find(l => l.label === "Maps")?.url || "#";
      return `
        <article class="stop${isLast ? " is-last" : ""}" style="--line-color: ${escapeHtml(stop.color)}; --stagger: ${index}">
          <div class="time-rail" aria-hidden="true">
            <div class="time-start">${escapeHtml(stop.startTime)}</div>
            <div class="rail-track">
              <span class="rail"></span>
              <span class="node"></span>
              <span class="node node-end"></span>
            </div>
            <div class="time-end">${escapeHtml(stop.endTime)}</div>
          </div>
          <div class="stop-content" tabindex="0" role="group" aria-label="${escapeHtml(stop.venue)} stop">
            ${renderLineCard(stop)}
            <div class="venue-block">
              <h3 class="venue-name">
                <a href="${escapeHtml(mapsUrl)}" target="_blank" rel="noopener noreferrer">
                  ${escapeHtml(stop.venue)}${renderChevs()}
                </a>
              </h3>
              <span class="time-badge">${escapeHtml(stop.timeRange)}</span>
              <p class="subtitle">${escapeHtml(stop.subtitle)}</p>
              <p class="description">${escapeHtml(stop.description)}</p>
              ${renderWeather(stop.weather)}
            </div>

        </aside>

    }

    function renderTransfer(transfer, stagger) {
      if (!transfer) return "";
      const optionCount = transfer.options?.length || 0;
      return `
        <div class="transfer" style="--stagger: ${stagger}">
          <details class="transfer-details">
            <summary class="transfer-summary" aria-label="${escapeHtml(transfer.title)} — ${optionCount} options">
              <div class="transfer-card">
                <div class="transfer-head">
                  <div class="transfer-icon" aria-hidden="true">⇄</div>
                  <div class="transfer-copy">
                    <p class="transfer-title">${escapeHtml(transfer.title)}</p>
                    <p class="transfer-text">${escapeHtml(transfer.text)}</p>
                  </div>
                  <span class="transfer-chev" aria-hidden="true">›</span>
                </div>
              </div>
            </summary>
            ${renderTransferOptions(transfer.options)}
          </details>
        </div>
      `;
    }

    function renderDemoCredit() {
      return `

          <p>Crawl Trails demo - an <strong>AMOTE</strong> project by NSC</p>
        </footer>
      `;
    }

    function render(data) {
      const stops = data.stops;
      app.innerHTML = `
        ${renderFooter(data.footerText)}
        <div class="sticky-header">
          <p class="updated">${escapeHtml(data.lastUpdatedAt)}</p>
          <h2 class="section-title">Malachi's Birthday Dance Crawl</h2>

        <section class="route-list" aria-label="Dance crawl route">
          ${stops.map((stop, i) => renderStop(stop, i, stops.length) + renderTransfer(stop.transferAfter, i)).join("")}
        </section>
        ${renderDemoCredit()}
      `;
    }

    render(crawlData);
    setupWeatherToggle();
    setupMobileInteractions();

    function setupWeatherToggle() {
      const card = app.querySelector(".weather-card");
      if (!card) return;

      const highF = Number(card.dataset.highF);
      const lowF = Number(card.dataset.lowF);

      function formatTemp(fahrenheit, unit) {
        if (unit === "C") return `${Math.round((fahrenheit - 32) * 5 / 9)}°`;
        return `${fahrenheit}°`;
      }

      function applyUnit(unit) {
        card.querySelectorAll(".weather-unit").forEach((btn) => {
          btn.classList.toggle("is-active", btn.dataset.unit === unit);
          btn.setAttribute("aria-pressed", btn.dataset.unit === unit ? "true" : "false");
        });
        card.querySelector(".weather-high").textContent = formatTemp(highF, unit);
        card.querySelector(".weather-low").textContent = formatTemp(lowF, unit);
        card.querySelector(".weather-summary").textContent =
          unit === "C" ? card.dataset.summaryC : card.dataset.summaryF;
        try {
          localStorage.setItem("weatherUnit", unit);
        } catch (_) {}
      }

      card.querySelectorAll(".weather-unit").forEach((btn) => {
        btn.setAttribute("aria-pressed", btn.classList.contains("is-active") ? "true" : "false");
        btn.addEventListener("click", (event) => {
          event.stopPropagation();
          applyUnit(btn.dataset.unit);
        });
      });

      let saved = "F";
      try {
        saved = localStorage.getItem("weatherUnit") || "F";
      } catch (_) {}
      applyUnit(saved === "C" ? "C" : "F");
    }

    function setupMobileInteractions() {
      const touchQuery = window.matchMedia("(hover: none), (pointer: coarse)");
      let scrollObserver = null;

      const observeStops = () => {
        if (scrollObserver) {
          scrollObserver.disconnect();
          scrollObserver = null;
        }
        app.querySelectorAll(".stop").forEach((stop) => stop.classList.remove("is-in-view"));

        if (!touchQuery.matches) return;

        scrollObserver = new IntersectionObserver(
          (entries) => {
            entries.forEach(({ target, isIntersecting, intersectionRatio }) => {
              target.classList.toggle("is-in-view", isIntersecting && intersectionRatio >= 0.4);
            });
          },
          { root: null, rootMargin: "-18% 0px -18% 0px", threshold: [0, 0.4, 0.55, 0.7] }
        );
        app.querySelectorAll(".stop").forEach((stop) => scrollObserver.observe(stop));
      };

      const applyTouchClass = () => {
        document.body.classList.toggle("is-touch", touchQuery.matches);
        observeStops();
      };

      applyTouchClass();
      touchQuery.addEventListener("change", applyTouchClass);

      const tapTimers = new WeakMap();

      function flashTap(target) {
        app.querySelectorAll(".is-tapped").forEach((el) => {
          if (el !== target) el.classList.remove("is-tapped");
        });
        target.classList.add("is-tapped");
        const prev = tapTimers.get(target);
        if (prev) clearTimeout(prev);
        tapTimers.set(
          target,
          setTimeout(() => target.classList.remove("is-tapped"), 1400)
        );
      }

      app.addEventListener("click", (event) => {
        if (event.target.closest("a")) return;
        if (event.target.closest(".weather-unit")) return;
        if (event.target.closest("summary.transfer-summary")) return;

        const stop = event.target.closest(".stop");
        const transfer = event.target.closest(".transfer");
        const footer = event.target.closest(".footer-note");
        const target = stop || transfer || footer;

        if (!target) {
          app.querySelectorAll(".is-tapped").forEach((el) => el.classList.remove("is-tapped"));
          return;
        }

        flashTap(target);
      });

      app.addEventListener("keydown", (event) => {
        if (event.key !== "Enter" && event.key !== " ") return;
        const focusable = event.target.closest(".stop-content, .footer-note");
        if (!focusable) return;
        event.preventDefault();
        const target = focusable.closest(".stop, .transfer, .footer-note");
        if (target) flashTap(target);
      });
    }
  </script>
</body>
</html>
