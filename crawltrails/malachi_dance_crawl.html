<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Malachi's Dance Crawl</title>
  <style>
    :root {
      --bg: #050507;
      --panel: rgba(28, 31, 38, 0.92);
      --panel-border: rgba(255, 255, 255, 0.075);
      --text: #f6f6f7;
      --muted: #a9a9b2;
      --purple: #a05cff;
      --blue: #2f8cff;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
      --left-time-width: 104px;
      --rail-x: 32px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 50% 0%, rgba(110, 63, 255, 0.17), transparent 34%),
        radial-gradient(circle at 100% 25%, rgba(40, 140, 255, 0.10), transparent 32%),
        var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 0;
    }

    .crawl-shell {
      width: min(100vw, 480px);
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.025), transparent 20%),
        rgba(0,0,0,0.45);
      position: relative;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .crawl-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle at 22% 12%, rgba(255,255,255,0.05) 0 1px, transparent 1px),
        radial-gradient(circle at 72% 78%, rgba(255,255,255,0.035) 0 1px, transparent 1px);
      background-size: 40px 40px, 52px 52px;
      opacity: 0.35;
    }

    .crawl-app {
      position: relative;
      z-index: 1;
      padding: 24px 12px 18px;
    }

    .footer-note {
      display: flex;
      align-items: center;
      margin: 0 0 18px;
      min-height: 52px;
      border-radius: 17px;
      background: rgba(27,29,36,.96);
      border: 1px solid rgba(255,255,255,.08);
      padding: 8px 14px;
      gap: 12px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
    }

    .footer-note .globe { color: var(--purple); font-size: 29px; }
    .footer-note p { margin: 0; flex: 1; color: #d7d7dc; font-size: 15.5px; font-weight: 650; }
    .footer-note .heart { color: var(--purple); font-size: 31px; line-height: 1; }

    .updated {
      margin: 0 0 15px 10px;
      color: var(--muted);
      font-style: italic;
      font-size: 18px;
      font-weight: 600;
    }

    .section-title {
      margin: 0 0 6px 10px;
      font-size: 31px;
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .route-list {
      --line-color: var(--purple);
      position: relative;
      padding-bottom: 14px;
    }

    .stop {
      display: grid;
      grid-template-columns: var(--left-time-width) 1fr;
      gap: 0;
      position: relative;
      min-height: 108px;
      margin-top: 4px;
    }

    .time-label {
      padding-top: 21px;
      padding-left: 14px;
      color: #b9b9c0;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.035em;
    }

    .stop-main {
      position: relative;
      padding: 15px 10px 0 20px;
    }

    .rail {
      position: absolute;
      left: calc(-1 * (var(--left-time-width) - var(--rail-x)));
      top: 20px;
      bottom: -28px;
      width: 4px;
      border-radius: 999px;
      background: var(--line-color);
      box-shadow: 0 0 18px color-mix(in srgb, var(--line-color) 55%, transparent);
    }

    .node {
      position: absolute;
      left: calc(-1 * (var(--left-time-width) - var(--rail-x)) - 7px);
      top: 14px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #101014;
      border: 4px solid var(--line-color);
      box-shadow: 0 0 14px color-mix(in srgb, var(--line-color) 50%, transparent);
      z-index: 2;
    }

    .venue-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: start;
    }

    .venue-name {
      font-size: 24px;
      line-height: 1.05;
      font-weight: 900;
      letter-spacing: -0.045em;
      margin: 0;
    }

    .chev {
      color: var(--blue);
      font-weight: 900;
      margin-left: 4px;
    }

    .people {
      color: var(--purple);
      letter-spacing: -4px;
      font-size: 20px;
      padding-right: 3px;
      text-shadow: 0 0 14px rgba(160,92,255,.4);
      white-space: nowrap;
    }

    .time-badge {
      display: inline-block;
      margin-top: 4px;
      padding: 2px 8px 3px;
      border-radius: 6px;
      border: 2px solid var(--line-color);
      color: #fafafa;
      font-size: 17px;
      line-height: 1;
      font-weight: 900;
      background: rgba(0,0,0,.35);
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.3), 0 0 12px color-mix(in srgb, var(--line-color) 28%, transparent);
    }

    .subtitle,
    .description {
      margin: 4px 0 0;
      color: #d4d4db;
      font-size: 18px;
      line-height: 1.05;
      font-weight: 600;
    }

    .description { color: var(--muted); margin-top: 1px; }

    .line-card {
      margin-top: 12px;
      border-radius: 14px;
      background: linear-gradient(105deg, rgba(38,41,49,.97), rgba(22,24,30,.97));
      border: 1px solid var(--panel-border);
      min-height: 66px;
      padding: 10px 12px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.07), 0 10px 30px rgba(0,0,0,.23);
    }

    .line-title {
      color: var(--line-color);
      font-weight: 900;
      font-size: 19px;
      display: flex;
      align-items: center;
      gap: 9px;
      letter-spacing: -0.03em;
      margin-bottom: 5px;
    }

    .line-dot {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: var(--line-color);
      box-shadow: 0 0 12px color-mix(in srgb, var(--line-color) 50%, transparent);
    }

    .cars-row {
      display: flex;
      align-items: center;
      gap: 5px;
      min-width: 0;
      color: #c2c3ca;
      font-weight: 800;
      font-size: 16px;
    }

    .cars {
      display: flex;
      gap: 3px;
      min-width: 0;
      flex-wrap: nowrap;
    }

    .car {
      width: clamp(18px, 6vw, 27px);
      height: 13px;
      border-radius: 1px;
      background: #8f9097;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.16);
    }

    .car.live { background: var(--line-color); }
    .car.last { border-radius: 1px 9px 9px 1px; }

    .card-arrow { color: #8c8d95; font-size: 30px; font-weight: 900; }

    .transfer {
      display: grid;
      grid-template-columns: var(--left-time-width) 1fr;
      align-items: center;
      margin: 8px 0 4px;
      min-height: 58px;
      position: relative;
    }

    .transfer::before {
      content: "";
      position: absolute;
      height: 1px;
      background: rgba(255,255,255,.22);
      top: 50%;
      left: 24px;
      width: 58px;
    }

    .transfer-card {
      grid-column: 2;
      margin-left: -30px;
      margin-right: 10px;
      border-radius: 13px;
      background: linear-gradient(95deg, rgba(33,36,45,.96), rgba(23,25,31,.96));
      border: 1px solid rgba(255,255,255,.055);
      min-height: 52px;
      display: grid;
      grid-template-columns: 48px 1fr;
      align-items: center;
      overflow: hidden;
      box-shadow: 0 10px 24px rgba(0,0,0,.26);
    }

    .transfer-icon {
      height: 100%;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,.04);
      color: var(--purple);
      font-size: 25px;
      font-weight: 900;
    }

    .transfer-copy { padding: 8px 12px; }

    .transfer-title {
      margin: 0;
      font-size: 18px;
      line-height: 1;
      font-weight: 900;
    }

    .transfer-text {
      margin: 3px 0 0;
      color: #aeb0b8;
      font-size: 16px;
      line-height: 1;
      font-weight: 600;
    }

    @media (max-width: 390px) {
      :root { --left-time-width: 92px; --rail-x: 29px; }
      .crawl-app { padding-left: 8px; padding-right: 8px; }
      .venue-name { font-size: 21px; }
      .time-badge { font-size: 15px; }
      .subtitle, .description { font-size: 16px; }
      .time-label { font-size: 18px; padding-left: 10px; }
      .line-title { font-size: 17px; }
      .cars-row { font-size: 14px; gap: 4px; }
      .footer-note p { font-size: 14px; }
    }
  </style>
</head>
<body>
  <main class="crawl-shell">
    <div class="crawl-app" id="app"></div>
  </main>

  <script>
    const crawlData = {
      updatedText: "Last updated just now",
      footerText: "Hop on anywhere — friends can join at any stop.",
      stops: [
        {
          venue: "Brooklyn Bridge Park",
          startTime: "3:00 PM",
          timeRange: "3:00 PM–6:00 PM",
          subtitle: "Park + chill",
          description: "Anyone can join here",
          lineName: "Park Line",
          carsLabel: "8 cars",
          liveCars: 7,
          totalCars: 9,
          color: "#18b95c",
          transferAfter: { title: "Transfer", text: "Join the crawl at any stop" }
        },
        {
          venue: "Hot Pot",
          startTime: "6:00 PM",
          timeRange: "6:00 PM–8:00 PM",
          subtitle: "Dinner stop",
          description: "Fuel up before the night",
          lineName: "Broth Line",
          carsLabel: "6 cars",
          liveCars: 4,
          totalCars: 8,
          color: "#ff512f",
          transferAfter: { title: "Transfer", text: "Roll into pregame" }
        },
        {
          venue: "Berlin",
          startTime: "8:00 PM",
          timeRange: "8:00 PM–9:30 PM",
          subtitle: "Pregame",
          description: "Live music bar",
          lineName: "Berlin Line",
          carsLabel: "7 cars",
          liveCars: 3,
          totalCars: 7,
          color: "#f3c319",
          transferAfter: { title: "Transfer", text: "Dance crawl continues" }
        },
        {
          venue: "Good Room",
          startTime: "10:00 PM",
          timeRange: "10:00 PM–12:30 AM",
          subtitle: "Dance floor",
          description: "Brooklyn",
          lineName: "Good Room Line",
          carsLabel: "6 cars",
          liveCars: 3,
          totalCars: 7,
          color: "#2f8cff",
          transferAfter: { title: "Transfer", text: "Late-night connection" }
        },
        {
          venue: "Market Hotel",
          startTime: "1:00 AM",
          timeRange: "1:00 AM–4:00 AM",
          subtitle: "Final stop",
          description: "Brooklyn",
          lineName: "After Hours Line",
          carsLabel: "5 cars",
          liveCars: 4,
          totalCars: 6,
          color: "#9b55ff"
        }
      ]
    };

    const app = document.getElementById("app");

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function makeCars(stop) {
      const total = stop.totalCars || 6;
      const live = stop.liveCars || 0;
      return Array.from({ length: total }, (_, index) => {
        const classes = ["car"];
        if (index < live) classes.push("live");
        if (index === total - 1) classes.push("last");
        return `<span class="${classes.join(" ")}" aria-hidden="true"></span>`;
      }).join("");
    }

    function renderFooter(text) {
      return `
        <aside class="footer-note">
          <span class="globe" aria-hidden="true">◉</span>
          <p>${escapeHtml(text)}</p>
          <span class="heart" aria-hidden="true">♡</span>
        </aside>
      `;
    }

    function renderLineCard(stop) {
      return `
        <div class="line-card">
          <div>
            <div class="line-title"><span class="line-dot"></span>${escapeHtml(stop.lineName)}</div>
            <div class="cars-row"><span>${escapeHtml(stop.carsLabel)}</span><span class="cars">${makeCars(stop)}</span></div>
          </div>
          <div class="card-arrow" aria-hidden="true">»</div>
        </div>
      `;
    }

    function renderStop(stop) {
      return `
        <article class="stop" style="--line-color: ${escapeHtml(stop.color)}">
          <div class="time-label">${escapeHtml(stop.startTime)}</div>
          <div class="stop-main">
            <span class="rail" aria-hidden="true"></span>
            <span class="node" aria-hidden="true"></span>
            <div class="venue-row">
              <div>
                <h3 class="venue-name">${escapeHtml(stop.venue)} <span class="chev">›</span></h3>
                <span class="time-badge">${escapeHtml(stop.timeRange)}</span>
                <p class="subtitle">${escapeHtml(stop.subtitle)}</p>
                <p class="description">${escapeHtml(stop.description)}</p>
              </div>
              <div class="people" aria-label="friends can join">♟♟♟♟</div>
            </div>
            ${renderLineCard(stop)}
          </div>
        </article>
      `;
    }

    function renderTransfer(transfer) {
      if (!transfer) return "";
      return `
        <div class="transfer">
          <div class="transfer-card">
            <div class="transfer-icon" aria-hidden="true">⇄</div>
            <div class="transfer-copy">
              <p class="transfer-title">${escapeHtml(transfer.title)}</p>
              <p class="transfer-text">${escapeHtml(transfer.text)}</p>
            </div>
          </div>
        </div>
      `;
    }

    function render(data) {
      app.innerHTML = `
        ${renderFooter(data.footerText)}
        <p class="updated">${escapeHtml(data.updatedText)}</p>
        <h2 class="section-title">Crawl</h2>
        <section class="route-list" aria-label="Dance crawl route">
          ${data.stops.map(stop => renderStop(stop) + renderTransfer(stop.transferAfter)).join("")}
        </section>
      `;
    }

    render(crawlData);
  </script>
</body>
</html>
