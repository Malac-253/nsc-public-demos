target.addEventListener(eventName,function(ev){
(rule.actions||[]).forEach(function(action){
if(action.type==='toggle-class')el.classList.toggle(action.className);
if(action.type==='add-class')el.classList.add(action.className);
if(action.type==='remove-class')el.classList.remove(action.className);
if(action.type==='emit')window.dispatchEvent(new CustomEvent(action.event,{detail:action.detail||{}}));
if(action.type==='navigate'&&action.href)location.href=action.href;
});
});
});
});
function lfcEventNodes(root,id){
if(!id)return [root];
var escaped=(window.CSS&&CSS.escape)?CSS.escape(id):id.replace(/["\\]/g,'\\$&');
var selector='[data-definition-node="'+escaped+'"],[data-background-node="'+escaped+'"]';
var nodes=Array.from(root.querySelectorAll(selector));
if(root.matches&&root.matches(selector))nodes.unshift(root);
/* Never fall back to the navbar root when a specific definition id is
missing — projected menu rows often lack data-definition-node, and
applying hide/scale to the whole bar collapses phone/tablet nav. */
return nodes;
}
function lfcEventDevice(rule){
var d=rule.device||'all',w=window.innerWidth;
if(d==='all')return true;
if(d==='custom'){
var bounds=rule.device_rule||{};
return (!bounds.min_width||w>=Number(bounds.min_width))&&
(!bounds.max_width||w<=Number(bounds.max_width));
}
var current=w<640?'phone':w<1024?'tablet':'desktop';
return d.split('+').indexOf(current)>=0;
}
function lfcEventClass(action){
return {
hide:'lfc-event-hide',show:'lfc-event-reveal',grow:'lfc-event-grow',
fade:'lfc-event-fade','background-reveal':'lfc-event-reveal',
reveal:'lfc-event-reveal','color-flip':'lfc-event-color-flip'
}[action]||'';
}
document.querySelectorAll('[data-lfc-events]').forEach(function(root){
if(root.dataset.lfcEventsBound)return;root.dataset.lfcEventsBound='1';
var rules=[];try{rules=JSON.parse(root.dataset.lfcEvents||'[]');}catch(e){return;}
rules.forEach(function(rule){
var owners=lfcEventNodes(root,rule.owner_definition);
var affected=lfcEventNodes(root,rule.affected_definition||rule.owner_definition);
var cls=lfcEventClass(rule.effect_action),payload=rule.payload||{};
function apply(on){
if(!lfcEventDevice(rule))return;
affected.forEach(function(node){
if(cls)node.classList.toggle(cls,on);
if(rule.effect_action==='scale'&&payload.factor)
node.style.setProperty('--lfc-event-scale',String(payload.factor));
if(rule.effect_type==='amote'&&rule.amote_animation_id){
node.dataset.animationId=String(rule.amote_animation_id);
if(on)node.dispatchEvent(new CustomEvent('amote:play',{detail:{
animationId:rule.amote_animation_id,payload:payload
}}));
}
});
}
if(rule.trigger==='hover'){
owners.forEach(function(owner){
owner.addEventListener('pointerenter',function(){apply(true);});
owner.addEventListener('pointerleave',function(){apply(false);});
});
}else if(rule.trigger==='click'){
var on=false;owners.forEach(function(owner){
owner.addEventListener('click',function(){on=!on;apply(on);});
});
}else if(rule.trigger==='load'||rule.trigger==='always'||rule.trigger==='viewport'){
apply(true);
if(rule.trigger==='load'&&payload.duration_ms)
setTimeout(function(){apply(false);},Number(payload.duration_ms));
}
});
});
document.querySelectorAll('[data-carousel]').forEach(function(root){
if(root.dataset.lfcCarouselBound)return;root.dataset.lfcCarouselBound='1';
var track=root.querySelector('.lfc-carousel__track'),slides=root.querySelectorAll('.lfc-carousel__slide');
var dots=root.querySelectorAll('.lfc-carousel__dots button'),i=0,ms=Number(root.dataset.interval||5000);
var prev=root.querySelector('[data-carousel-prev]'),next=root.querySelector('[data-carousel-next]');
var timer=null;
function go(n){i=(n+slides.length)%slides.length;track.style.transform='translateX(-'+(i*100)+'%)';
dots.forEach(function(d,j){d.classList.toggle('on',j===i);});}
function tick(){if(timer)clearInterval(timer);if(slides.length>1)timer=setInterval(function(){go(i+1);},ms);}
dots.forEach(function(d,j){d.addEventListener('click',function(){go(j);tick();});});
if(prev)prev.addEventListener('click',function(){go(i-1);tick();});
if(next)next.addEventListener('click',function(){go(i+1);tick();});
tick();go(0);
});
// Image presenter primitive: wheel zoom + drag pan, clamped to its box.
document.querySelectorAll('[data-image-presenter]').forEach(function(root){
if(root.dataset.lfcPresenterBound)return;root.dataset.lfcPresenterBound='1';
var img=root.querySelector('.lfc-presenter__img');if(!img)return;
var s=1,x=0,y=0,drag=null;
function clamp(){
var w=root.clientWidth,h=root.clientHeight;
var maxX=Math.max(0,(w*s-w)/2),maxY=Math.max(0,(h*s-h)/2);
x=Math.max(-maxX,Math.min(maxX,x));y=Math.max(-maxY,Math.min(maxY,y));
}
function apply(){clamp();img.style.transform='translate('+x+'px,'+y+'px) scale('+s+')';}
root.addEventListener('wheel',function(e){
e.preventDefault();
s=Math.max(1,Math.min(6,s*(e.deltaY<0?1.12:0.9)));apply();
},{passive:false});
root.addEventListener('pointerdown',function(e){
drag={px:e.clientX,py:e.clientY,ox:x,oy:y};root.setPointerCapture(e.pointerId);
});
root.addEventListener('pointermove',function(e){
if(!drag)return;x=drag.ox+(e.clientX-drag.px);y=drag.oy+(e.clientY-drag.py);apply();
});
root.addEventListener('pointerup',function(){drag=null;});
root.querySelectorAll('[data-presenter-zoom]').forEach(function(btn){
btn.addEventListener('click',function(){
s=Math.max(1,Math.min(6,s*(btn.dataset.presenterZoom==='in'?1.3:0.75)));apply();
});
});
});
})();
</script></div>

<script>
(function() {
var SITE = 'blackcrown', PAGE = 'account', INGEST = '/api/v1/analytics/ingest/';
var sid = sessionStorage.getItem('amote_sid');
if (!sid) { sid = Math.random().toString(36).slice(2) + Date.now().toString(36);
sessionStorage.setItem('amote_sid', sid); }
var t0 = performance.now();
function send(ev) {
ev.site_slug = SITE; ev.page_slug = PAGE; ev.session_id = sid;
ev.referrer = document.referrer || '';
navigator.sendBeacon
? navigator.sendBeacon(INGEST, new Blob([JSON.stringify(ev)], {type:'application/json'}))
: fetch(INGEST, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(ev), keepalive:true});
}
send({event_type:'session_start'});
send({event_type:'page_view'});
window.addEventListener('load', function() {
send({event_type:'page_load', value:{ms: Math.round(performance.now() - t0)}});
});
window.addEventListener('pagehide', function() { send({event_type:'page_exit'}); });
// Per-mote visibility + scroll past/back tracking.
var seen = {}, maxIdx = -1;
var shells = Array.prototype.slice.call(document.querySelectorAll('[data-mote-uid]'));
shells.forEach(function(el, idx) { el.__idx = idx; });
if ('IntersectionObserver' in window) {
var io = new IntersectionObserver(function(entries) {
entries.forEach(function(e) {
var el = e.target, uid = el.getAttribute('data-mote-uid');
if (e.isIntersecting) {
el.__enter = performance.now();
if (!seen[uid]) { seen[uid] = true; send({event_type:'mote_view', mote_uid:uid}); }
if (el.__idx < maxIdx) send({event_type:'mote_scroll_back', mote_uid:uid});
maxIdx = Math.max(maxIdx, el.__idx);
} else if (el.__enter) {
var ms = Math.round(performance.now() - el.__enter); el.__enter = 0;
send({event_type:'mote_visible_ms', mote_uid:uid, value:{ms:ms}});
if (el.__idx < maxIdx) send({event_type:'mote_scroll_past', mote_uid:uid});
}
});
}, {threshold: 0.5});
shells.forEach(function(el) { io.observe(el); });
}
// Clicks: outbound link vs aux action.
document.addEventListener('click', function(e) {
var shell = e.target.closest('[data-mote-uid]'); if (!shell) return;
var uid = shell.getAttribute('data-mote-uid');
if (e.target.closest('[data-mote-slot="secondaryAction"]')) send({event_type:'aux_action_click', mote_uid:uid});
else if (e.target.closest('[data-mote-slot="hitbox"]')) { send({event_type:'mote_click', mote_uid:uid}); send({event_type:'link_click', mote_uid:uid}); }
});
})();
</script>
